name: Deploy

on:
  push:
    branches: [main]

env:
  BINARY_NAME: asnc-telegram-bot
  DEPLOY_DIR: /home/${{ secrets.SSH_USER }}/asnc-telegram-bot

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ${{ env.BINARY_NAME }} ./cmd/bot

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: ${{ env.BINARY_NAME }}
          target: ${{ env.DEPLOY_DIR }}/

      - name: Restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            systemctl --user restart ${{ env.BINARY_NAME }}.service
            sleep 2
            systemctl --user is-active ${{ env.BINARY_NAME }}.service
